services:
  postgres:
    image: postgres:16
    container_name: wine_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mlops_network 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:latest
    container_name: wine_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    networks:
      - mlops_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  create-bucket:
    image: minio/mc:latest
    container_name: wine_create_bucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${MLFLOW_BUCKET_NAME} || true;
      mc anonymous set none local/${MLFLOW_BUCKET_NAME} || true;
      echo 'Bucket MLflow prêt.';
      "
    networks:
      - mlops_network
    restart: "no"

  mlflow:
    image: python:3.12-slim
    container_name: wine_mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_EC2_METADATA_DISABLED: ${AWS_EC2_METADATA_DISABLED}
    ports:
      - "${MLFLOW_PORT}:5000"
    command: >
      bash -c "pip install --no-cache-dir mlflow psycopg2-binary boto3 &&
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --default-artifact-root s3://${MLFLOW_BUCKET_NAME}/
      --host 0.0.0.0
      --port 5000
      --allowed-hosts '*'
      "
    networks:
      - mlops_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000')\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: wine_api
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_REGISTRY_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_EC2_METADATA_DISABLED: ${AWS_EC2_METADATA_DISABLED}
      MLFLOW_MODEL_NAME: ${MLFLOW_MODEL_NAME}
      MLFLOW_MODEL_ALIAS: ${MLFLOW_MODEL_ALIAS}
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME}
      PREPROCESSING_OBJECTS_PATH: ${PREPROCESSING_OBJECTS_PATH}
      DATA_PROCESSED_DIR: ${DATA_PROCESSED_DIR}
      MODELS_DIR: ${MODELS_DIR}
      REPORTS_DIR: ${REPORTS_DIR}
      FIGURES_DIR: ${FIGURES_DIR}
      PYTHONPATH: /app
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    networks:
      - mlops_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  jenkins:
    build:
      context: .
      dockerfile: docker/Dockerfile.jenkins
    container_name: wine_jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mlops_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mlops_network:
    name: wine_mlops_network
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  jenkins_home:

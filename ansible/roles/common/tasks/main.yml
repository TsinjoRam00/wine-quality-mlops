---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Install common packages
  apt:
    name:
      - git
      - curl
      - ca-certificates
      - gnupg
      - lsb-release
      - python3
      - python3-pip
      - python3-venv
      - python3-apt
    state: present
  when: ansible_os_family == "Debian"

- name: Create application directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ ansible_user | default('root') }}"
    group: "{{ ansible_user | default('root') }}"
    mode: "0755"

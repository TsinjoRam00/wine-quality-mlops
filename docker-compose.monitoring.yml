services:
  prometheus:
    image: prom/prometheus:latest
    container_name: wine_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports: ["9090:9090"]
    networks: [mlops_network]

  alertmanager:
    image: prom/alertmanager:latest
    container_name: wine_alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports: ["9093:9093"]
    networks: [mlops_network]

  grafana:
    image: grafana/grafana:latest
    container_name: wine_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
    ports: ["3000:3000"]
    networks: [mlops_network]

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: wine_blackbox_exporter
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks: [mlops_network]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: wine_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: >-
        postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    networks: [mlops_network]

networks:
  mlops_network:
    external: true
    name: wine_mlops_network

volumes:
  prometheus_data:
  grafana_data:
